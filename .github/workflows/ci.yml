name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-conversion:
    name: Test Whitepaper Conversion
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node --test tests/test-conversion.mjs

  test-ingestion:
    name: Test DeepWiki Ingestion
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pytest
      - run: python -m pytest tests/test-ingestion.py -v

  build-and-validate:
    name: Build & Validate
    runs-on: ubuntu-latest
    needs: [test-conversion, test-ingestion]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Convert whitepaper
        run: npm run convert

      - name: Build site
        run: npm run build

      - name: Validate build output
        run: node tests/test-build-output.mjs
