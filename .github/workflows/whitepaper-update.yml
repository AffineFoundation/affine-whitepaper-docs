name: "Whitepaper Content Update"

on:
  push:
    branches: [main]
    paths:
      - 'whitepaper/**/*.md'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deployment mode'
        required: true
        default: 'pr'
        type: choice
        options:
          - pr
          - auto-merge

permissions:
  contents: write
  pull-requests: write

jobs:
  convert-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Convert whitepaper to MDX
        run: npm run convert

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet src/content/docs/ || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Build site (validation)
        if: steps.check_changes.outputs.changes == 'true'
        run: npm run build

      # PR mode (default) — create a PR for review
      - name: Create PR
        if: steps.check_changes.outputs.changes == 'true' && (github.event_name == 'push' || github.event.inputs.mode == 'pr')
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: Update whitepaper content"
          title: "docs: Whitepaper content update"
          body: |
            Automated update from whitepaper source markdown.

            Changes detected in `whitepaper/` directory.
            MDX files in `src/content/docs/` have been regenerated.

            Site build validated successfully.
          branch: docs/whitepaper-update
          delete-branch: true

      # Auto-merge mode — commit and push directly
      - name: Auto-merge
        if: steps.check_changes.outputs.changes == 'true' && github.event.inputs.mode == 'auto-merge'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/docs/
          git commit -m "docs: Auto-update whitepaper content"
          git push
